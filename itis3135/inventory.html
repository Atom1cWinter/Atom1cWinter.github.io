<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Book Inventory</title>
    <link rel="stylesheet" href="styles/default.css" />
    <script
      src="https://lint.page/kit/4d0fe3.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div data-include="components/header.html"></div>
    <h1>Book Inventory</h1>
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Category</th>
          <th>Status</th>
          <th>Rate</th>
        </tr>
      </thead>
      <tbody>
        <tr class="read">
          <td>The Hidden Lives of Owls</td>
          <td>Leigh Calvez</td>
          <td>Natural History</td>
          <td><span class="status">Read</span></td>
          <td>
            <span class="rate three"
              ><span></span><span></span><span></span
            ></span>
          </td>
        </tr>
        <tr class="in-progress">
          <td>Owl Sense</td>
          <td>Miriam Darlington</td>
          <td>Memoir</td>
          <td><span class="status">In Progress</span></td>
          <td>
            <span class="rate two"
              ><span></span><span></span><span></span
            ></span>
          </td>
        </tr>
        <tr class="to-read">
          <td>Wesley the Owl</td>
          <td>Stacey O'Brien</td>
          <td>Biography</td>
          <td><span class="status">To Read</span></td>
          <td>
            <span class="rate one"
              ><span></span><span></span><span></span
            ></span>
          </td>
        </tr>
        <tr class="read">
          <td>Owls of the Eastern Ice</td>
          <td>Jonathan C. Slaght</td>
          <td>Conservation</td>
          <td><span class="status">Read</span></td>
          <td>
            <span class="rate three"
              ><span></span><span></span><span></span
            ></span>
          </td>
        </tr>
      </tbody>
    </table>
    <div data-include="components/footer.html"></div>
    <script src="scripts/HTMLInclude.min.js"></script>
  </body>
</html>
