<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charlotte Home</title>

    <link rel="stylesheet" href="styles/project.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script
      src="https://lint.page/kit/4d0fe3.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body>
    <div data-include="./components/header.html"></div>

    <main>
      <h2>Welcome to the Stream</h2>
      <p class="homepage">
        Hi! I'm Charlotteow_ and I'm a GM Mercy player absolutely
        <i>grinding</i> through the ladder.
      </p>

      <p>
        Thanks for joining me on the grind and welcome to the stream! Let's have
        some fun!
      </p>

      <div class="homepage-video">
        <iframe
          src="https://youtube.com/embed/X4_OwCYr0Zc?si=V43aaY8tdUD7ap_A"
          title="2021 | Mercy Montage (Overwatch)"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          allowfullscreen
        ></iframe>
      </div>
      <section class="social-links">
        <p class="homepage">
          I throw together random youtube montages too! Here's one of my old
          ones!
        </p>
        <h3>Follow Charlotte!</h3>
        <div class="social-icons">
          <a
            href="https://www.twitch.tv/charlotteow_"
            target="_blank"
            title="Twitch"
            ><i class="fa-brands fa-twitch"></i
          ></a>
          <a
            href="https://www.youtube.com/@Sincitycharotte"
            target="_blank"
            title="YouTube"
            ><i class="fa-brands fa-youtube"></i
          ></a>
          <a href="https://tiktok.com" target="_blank" title="TikTok"
            ><i class="fa-brands fa-tiktok"></i
          ></a>
        </div>
      </section>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="scripts/theme.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/HTMLInclude.min.js"></script>
  </body>
</html>
