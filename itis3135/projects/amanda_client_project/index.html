<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charlotte Home</title>

    <link rel="stylesheet" href="styles/project.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script
      src="https://lint.page/kit/4d0fe3.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div data-include="./components/header.html"></div>

    <main>
      <h2>Welcome to the Stream</h2>
      <p>
        Intro paragraph about Charlotte, her streams, and what viewers can
        expect.
      </p>

      <div class="homepage-video">
        <iframe
          src="https://youtu.be/X4_OwCYr0Zc?si=V43aaY8tdUD7ap_A"
          title="2021 | Mercy Montage (Overwatch)"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          allowfullscreen
        ></iframe>
      </div>
      <figure>
        <img
          src="images/hero-banner.jpg"
          alt="Overwatch Gameplay"
          style="width: 100%; max-width: 800px"
        />
        <figcaption>Catch the action live on Twitch!</figcaption>
      </figure>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="scripts/main.js"></script>
    <script src="scripts/HTMLInclude.min.js"></script>
  </body>
</html>
