<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charlotte | Media Gallery</title>

    <link rel="stylesheet" href="styles/project.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script
      src="https://lint.page/kit/4d0fe3.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div data-include="components/header.html"></div>

    <main>
      <h2>Media Gallery</h2>
      <p>
        <strong>We might scrap this page and replace with merchandise</strong>
      </p>
      <p>Fill with stream highlights, fan art (if their is any), and clips</p>

      <div id="image-gallery">
        <figure>
          <img
            src="images/highlight-1.jpg"
            alt="Overwatch POTG - Support Hero"
            width="400"
          />
          <figcaption>Huge clutch in overtime!</figcaption>
        </figure>

        <figure>
          <img
            src="images/fan-art-1.jpg"
            alt="Viewer fan art of stream mascot"
            width="400"
          />
          <figcaption>Incredible fan art by [Viewer Name]</figcaption>
        </figure>

        <figure>
          <img
            src="images/highlight-2.jpg"
            alt="Overwatch Team Kill"
            width="400"
          />
          <figcaption>Clean team wipe on King's Row.</figcaption>
        </figure>

        <figure>
          <img
            src="images/stream-setup.jpg"
            alt="Client's Streaming Desk Setup"
            width="400"
          />
          <figcaption>Behind the scenes: The command center.</figcaption>
        </figure>
      </div>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="scripts/theme.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/HTMLInclude.min.js"></script>
  </body>
</html>
