<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playing Cards</title>
    <link rel="stylesheet" href="styles/cards.css" />
    <script
      src="https://lint.page/kit/4d0fe3.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <main id="playing-cards">
      <div class="card">
        <div class="left">A<br />♠</div>
        <div class="middle">
          <div class="suit-top">🦉</div>
          <div class="suit-bottom">♠</div>
        </div>
        <div class="right">A<br />♠</div>
      </div>

      <div class="card card-hearts">
        <div class="left">A<br />♥</div>
        <div class="middle">
          <div class="suit-top">🦉</div>
          <div class="suit-bottom">♥</div>
        </div>
        <div class="right">A<br />♥</div>
      </div>

      <div class="card card-diamonds">
        <div class="left">A<br />♦</div>
        <div class="middle">
          <div class="suit-top">🦉</div>
          <div class="suit-bottom">♦</div>
        </div>
        <div class="right">A<br />♦</div>
      </div>
    </main>
  </body>
</html>
