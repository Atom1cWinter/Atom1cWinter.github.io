<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voting System</title>
    <link rel="stylesheet" href="styles/default.css" />
    <script
      src="https://lint.page/kit/4d0fe3.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div data-include="components/header.html"></div>
    <main class="page-shell widget-page voting-page">
      <section class="widget-card voting-hero">
        <p class="eyebrow">Community poll</p>
        <h1>Voting System</h1>
        <p class="page-summary">
          Add options, cast votes, and watch the poll update in real time.
        </p>
      </section>

      <div class="voting-layout">
        <section class="widget-card voting-options">
          <h2>Cast a Vote</h2>
          <div id="poll-options" class="option-list" aria-live="polite"></div>

          <form id="add-option-form" class="inline-form">
            <label class="field" for="new-option-input">
              <span>Add a new option</span>
              <input
                id="new-option-input"
                type="text"
                maxlength="60"
                placeholder="Example: Snowy Owl"
              />
            </label>
            <button class="button-primary" type="submit">Add Option</button>
          </form>
          <p id="vote-message" class="status-message">
            Choose an option to vote.
          </p>
        </section>

        <section class="widget-card voting-results">
          <h2>Results</h2>
          <div id="poll-results" class="results-list" aria-live="polite"></div>
        </section>
      </div>
    </main>
    <div data-include="components/footer.html"></div>
    <script src="scripts/voting.js"></script>
    <script src="scripts/HTMLInclude.min.js"></script>
  </body>
</html>
